name: Build Wheels
on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        with:
            # Point to the subdirectory containing your setup/pyproject file
          package-dir: calc_tb_sounder
        env:
          CIBW_BUILD_VERBOSITY: 1
          # Install system-level netcdf dependencies inside the manylinux container
          # 1. Install everything including the pkgconfig tool
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y epel-release && 
            yum install -y netcdf-devel netcdf-fortran-devel hdf5-devel pkgconfig
            find /usr -name "netcdf.mod" # <--- Debugging: verify location
          # 2. Tell Meson exactly where to look for netcdff.pc
          CIBW_ENVIRONMENT: >
            PKG_CONFIG_PATH=/usr/lib64/pkgconfig:/usr/share/pkgconfig \
            FC=gfortran
          # Ensure numpy is present for f2py
          CIBW_BEFORE_BUILD: pip install numpy
          # Optional: Skip older Python versions
          CIBW_SKIP: cp36-* cp37-* cp38-* cp39-*